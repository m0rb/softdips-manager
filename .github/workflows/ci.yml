name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Linux x64,    os: ubuntu-22.04 }
          - { name: Linux arm64,  os: ubuntu-24.04-arm }
          - { name: macOS arm64,  os: macos-14 }
          - { name: Windows x64,  os: windows-2022 }

    steps:
      - uses: actions/checkout@v4

      # ── Qt: distro packages on Linux, aqt elsewhere ──
      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qt6-base-dev qt6-base-dev-tools libgl1-mesa-dev ninja-build

      - name: Install Qt (macOS / Windows)
        if: runner.os != 'Linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          cache: true

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  # Validate the Emscripten web build (no deploy — Pages deploy lives in pages.yml).
  web-build:
    name: Web (Emscripten)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build web app (Emscripten)
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          cd "$RUNNER_TEMP/emsdk"
          ./emsdk install 5.0.7
          ./emsdk activate 5.0.7
          source ./emsdk_env.sh
          cd "$GITHUB_WORKSPACE"
          emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=Release
          cmake --build build-web

      - name: Verify build output
        run: |
          test -f web/softdips.js
          test -f web/softdips.wasm
